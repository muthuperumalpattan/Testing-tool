# API proxy must come first — Netlify uses first matching rule
# Replace the URL below with your Northflank service URL (Settings → Ports → Public URL)
# Example: https://testing-backend-xxxxx.code.run
[[redirects]]
  from = "/api/*"
  to = "https://REPLACE-WITH-YOUR-NORTHFLANK-URL/api/:splat"
  status = 200
  force = true

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
